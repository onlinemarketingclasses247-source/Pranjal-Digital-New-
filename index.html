<script>
  (function() {
    // Force remove any strikethrough on gold elements immediately
    var style = document.createElement('style');
    style.textContent = '.gold-gradient { text-decoration: none !important; text-decoration-line: none !important; }';
    document.head.appendChild(style);
    
    // Monitor for DOM changes and fix any strikethrough
    var observer = new MutationObserver(function() {
      var goldElements = document.querySelectorAll('.gold-gradient');
      goldElements.forEach(function(el) {
        if (el.style.textDecoration === 'line-through') {
          el.style.textDecoration = 'none';
        }
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  })();
</script>
